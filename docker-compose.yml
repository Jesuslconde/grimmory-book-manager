services:
  app:
    build:
      context: .
      args:
        APP_VERSION: "${APP_VERSION:-dev}"
    image: grimmory-book-manager:${APP_VERSION:-latest}
    ports:
      - "80:80"
    volumes:
      - ./data:/app/data
    labels:
      - "app.version=${APP_VERSION:-dev}"
    networks:
      - app-network

networks:
  app-network:
    driver: macvlan
    name: ${NETWORK_NAME:-grimmory-network}
    driver_opts:
      parent: ${NETWORK_INTERFACE:-eth0}
